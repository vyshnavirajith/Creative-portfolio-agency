<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2 class="logo">NOVA</h2>

        <a href="dashboard.html" class="menu active">Dashboard</a>
        <a href="projects.html" class="menu">Projects</a>
        <a href="team.html" class="menu">Team members</a>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Dashboard Overview</h1>

            <a href="newproject.html">
                <button class="btn">+ New Project</button>
            </a>
        </div>

        <div class="cards">

            <div class="card">
                <h2>24</h2>
                <p>Projects</p>
            </div>

            <div class="card">
                <h2>8</h2>
                <p>Clients</p>
            </div>

            <div class="card">
                <h2>12%</h2>
                <p>Growth</p>
            </div>

        </div>

        <div class="chart">
            <div class="bar small"></div>
            <div class="bar medium"></div>
            <div class="bar small"></div>
            <div class="bar large"></div>
            <div class="bar medium"></div>
            <div class="bar large"></div>
        </div>

        <div class="table-box">

            <h2>Recent Projects</h2>

            <table>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Date</th>
                </tr>

                <tr>
                    <td>Rohan</td>

                </tr>

                <tr>
                    <td>Sunita</td>

                </tr>
            </table>
