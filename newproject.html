<!DOCTYPE html>
<html>

<head>
    <title>Add New Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="sidebar">

            <h2 class="logo">NOVA</h2>

            <a href="dashboard.html" class="menu">Dashboard</a>

            <a href="projects.html" class="menu active">Projects</a>

        </div>


        <div class="main">

            <h1>Add New Project</h1>

            <form class="form" id="projectForm">

                <div class="row">

                    <div class="input-box">
                        <label>PROJECT TITLE</label>

                        <input type="text"
                            placeholder="e.g. Lumina Co. Branding" required>
                    </div>

                    <div class="input-box">
                        <label>CLIENT NAME</label>

                        <input type="text"
                            placeholder="Client or Company" required>
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">
                        <label>CATEGORY</label>

                        <select required>
                            <option value="">Select Category</option>
                            <option>Branding</option>
                            <option>UI/UX</option>
                            <option>Marketing</option>
                        </select>
                    </div>

                    <div class="input-box">
                        <label>YEAR</label>

                        <input type="number"
                            placeholder="2024" required>
                    </div>

                </div>

                <div class="input-box">

                    <label>PROJECT DESCRIPTION</label>

                    <textarea
                        placeholder="Describe the project, goals, and deliverables..." required></textarea>

                </div>

                <div class="input-box">

                    <label>UPLOAD IMAGES</label>

                    <div class="upload-box">
                        <input type="file" id="imageUpload" accept="image/*" multiple required>

                        Drag & Drop Images Here or
                        <span>browse files</span>
                    </div>

                </div>

                <div class="input-box">

                    <label>TAGS (comma-separated)</label>

                    <input type="text"
                        placeholder="logo, typography, brand guide" required>

                </div>

                <div class="input-box">

                    <label>STATUS</label>

                    <select required>
                        <option value="">Select Status</option>
                        <option>Draft</option>
                        <option>Published</option>
                    </select>

                </div>


                <div class="button-group">

                    <button type="submit" class="btn">
                        Save & Publish
                    </button>

                    <button type="button" class="btn secondary">
                        Save Draft
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
