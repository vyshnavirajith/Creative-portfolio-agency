<!DOCTYPE html>
<html lang="en">
<head>
    <script src="addMembers.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Member</title>
<link href="addMember.css" rel="stylesheet">
</head>

<body>

<div class="form-box">

    <h1>Add Member</h1>

    <div class="input-box">

        <label>Member Name</label>

        <input type="text" id="name">

    </div>

    <div class="input-box">

        <label>Role</label>

        <input type="text" id="role">

    </div>

    <div class="input-box">

        <label>Email ID</label>

        <input type="email" id="email">

    </div>

    <div class="input-box">

        <label>Status</label>

        <select id="status">

            <option>Active</option>
            <option>On Leave</option>

        </select>

    </div>

    <button id="submitBtn" onclick="check()">
        Submit
    </button>

</div>


</body>
</html>
