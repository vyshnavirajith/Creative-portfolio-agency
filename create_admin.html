
<!DOCTYPE html>
<html>
<head>
    <title>Create Admin</title>
    <script src="create_admin.js"></script>
    
    <link href="create_admin.css" rel="stylesheet">
</head>

<body>

    <h2>NOVA</h2>
    <h1>Create New Admin Account</h1>

    <div class="container">

        <div class="input-box">
            <label for="fname">First Name</label>
            <input id="fname" type="text" placeholder="Enter first name">
        </div>

        <div class="input-box">
            <label for="lname">Last Name</label>
            <input id="lname" type="text" placeholder="Enter last name">
        </div>

        <div class="input-box">
            <label for="email">Email ID</label>
            <input id="email" type="email" placeholder="Enter email">
        </div>

        <div class="input-box">
            <label for="tel">Phone Number</label>
            <input id="tel" type="tel" placeholder="Enter phone number">
        </div>

        <div class="input-box">
            <label for="role">Role</label>
            <input id="role" type="text" placeholder="Enter role">
        </div>

        <div class="input-box">
            <label for="address">Address</label>
            <input id="address" type="text" placeholder="Enter address">
        </div>

        <button type="button" onclick="check()">
            Create Account and Log In
        </button>

    </div>

</body>
</html>
